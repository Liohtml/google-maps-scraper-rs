name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: the workflow only needs to read the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable
      - uses: Swatinem/rust-cache@82f700af6037f3edea9f8d1bfd273d9e1c5dbcef # v2.7.7
      - name: Build
        run: cargo build --verbose
      - name: Test
        # The unit tests cover the pure parsing helpers and do not launch
        # Chrome, so no browser install is required here.
        run: cargo test --verbose

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@82f700af6037f3edea9f8d1bfd273d9e1c5dbcef # v2.7.7
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
